<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Agentic pattern decision graph</title>
  <desc id="desc">A visual decision graph for selecting single call, prompt chaining, routing, parallelization, orchestrator-workers, or agent loop.</desc>
  <rect width="1080" height="620" fill="#f8fafc"/>
  <rect x="24" y="24" width="1032" height="572" rx="18" fill="#ffffff" stroke="#d7dee8"/>
  <text x="60" y="76" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2937">Agentic Pattern Decision Graph</text>
  <text x="60" y="108" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">Read the scenario, then choose the smallest reliable workflow.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#cbd5e1; stroke-width:2; }
      .decision { fill:#eef6ff; stroke:#93c5fd; stroke-width:2; }
      .label { font-family:Inter, Arial, sans-serif; fill:#1f2937; font-weight:700; font-size:16px; }
      .body { font-family:Inter, Arial, sans-serif; fill:#475569; font-size:13px; }
      .small { font-family:Inter, Arial, sans-serif; fill:#64748b; font-size:12px; }
    </style>
  </defs>

  <g>
    <rect x="420" y="145" width="240" height="82" rx="10" class="decision"/>
    <text x="458" y="178" class="label">What kind of task?</text>
    <text x="452" y="202" class="body">Look for fixed steps, categories,</text>
    <text x="482" y="220" class="body">parallel parts, or feedback.</text>
  </g>

  <line x1="420" y1="186" x2="255" y2="186" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="70" y="145" width="170" height="82" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="105" y="178" class="label">Simple answer</text>
    <text x="97" y="202" class="body">No tools or only</text>
    <text x="96" y="220" class="body">one bounded step</text>
    <text x="110" y="254" class="small">Use: Single call</text>
  </g>

  <line x1="540" y1="227" x2="540" y2="295" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="420" y="310" width="240" height="88" rx="10" class="decision"/>
    <text x="468" y="344" class="label">Are steps fixed?</text>
    <text x="450" y="370" class="body">Same sequence every time?</text>
  </g>

  <line x1="420" y1="354" x2="270" y2="354" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="70" y="310" width="185" height="88" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="107" y="344" class="label">Yes: Chain</text>
    <text x="94" y="370" class="body">Step B depends on</text>
    <text x="106" y="388" class="body">Step A output</text>
  </g>

  <line x1="660" y1="354" x2="810" y2="354" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="825" y="310" width="185" height="88" rx="10" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2"/>
    <text x="861" y="344" class="label">No: Dynamic</text>
    <text x="848" y="370" class="body">Subtasks depend on</text>
    <text x="856" y="388" class="body">the actual input</text>
  </g>

  <line x1="918" y1="398" x2="918" y2="458" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="802" y="475" width="230" height="88" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="842" y="508" class="label">Orchestrator-workers</text>
    <text x="825" y="534" class="body">Best when subtasks cannot</text>
    <text x="848" y="552" class="body">be predicted upfront</text>
  </g>

  <line x1="540" y1="398" x2="540" y2="458" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="424" y="475" width="232" height="88" rx="10" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <text x="490" y="508" class="label">Routing</text>
    <text x="449" y="534" class="body">Classify request, then send</text>
    <text x="470" y="552" class="body">to specialist handler</text>
  </g>

  <line x1="162" y1="398" x2="162" y2="458" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="48" y="475" width="228" height="88" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="2"/>
    <text x="98" y="508" class="label">Parallelization</text>
    <text x="73" y="534" class="body">Independent checks can run</text>
    <text x="105" y="552" class="body">at the same time</text>
  </g>

  <path d="M660 186 C765 186, 765 230, 835 230" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="850" y="185" width="180" height="86" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
    <text x="896" y="218" class="label">Agent loop</text>
    <text x="877" y="244" class="body">Act, observe, retry</text>
    <text x="881" y="262" class="body">until complete</text>
  </g>
</svg>
