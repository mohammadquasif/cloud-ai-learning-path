<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Claude Architect Foundation certification roadmap</title>
  <desc id="desc">A six-step visual roadmap from Claude basics to exam readiness.</desc>
  <rect width="1100" height="520" fill="#f8fafc"/>
  <rect x="24" y="24" width="1052" height="472" rx="18" fill="#ffffff" stroke="#d7dee8"/>
  <text x="60" y="78" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2937">Claude Architect Foundation Roadmap</text>
  <text x="60" y="112" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">Study in order: concepts first, architecture decisions second, exam practice last.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(60 170)">
      <rect width="145" height="120" rx="12" fill="#eef6ff" stroke="#93c5fd"/>
      <circle cx="32" cy="34" r="16" fill="#2563eb"/>
      <text x="27" y="40" font-size="16" font-weight="700" fill="#ffffff">1</text>
      <text x="22" y="72" font-size="17" font-weight="700" fill="#1e293b">Claude</text>
      <text x="22" y="96" font-size="14" fill="#475569">HHH, context,</text>
      <text x="22" y="116" font-size="14" fill="#475569">safety basics</text>
    </g>

    <line x1="215" y1="230" x2="285" y2="230" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(300 170)">
      <rect width="145" height="120" rx="12" fill="#f0fdf4" stroke="#86efac"/>
      <circle cx="32" cy="34" r="16" fill="#16a34a"/>
      <text x="27" y="40" font-size="16" font-weight="700" fill="#ffffff">2</text>
      <text x="22" y="72" font-size="17" font-weight="700" fill="#1e293b">Agents</text>
      <text x="22" y="96" font-size="14" fill="#475569">Routing, chains,</text>
      <text x="22" y="116" font-size="14" fill="#475569">orchestration</text>
    </g>

    <line x1="455" y1="230" x2="525" y2="230" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(540 170)">
      <rect width="145" height="120" rx="12" fill="#fff7ed" stroke="#fdba74"/>
      <circle cx="32" cy="34" r="16" fill="#ea580c"/>
      <text x="27" y="40" font-size="16" font-weight="700" fill="#ffffff">3</text>
      <text x="22" y="72" font-size="17" font-weight="700" fill="#1e293b">Tools</text>
      <text x="22" y="96" font-size="14" fill="#475569">Schemas, MCP,</text>
      <text x="22" y="116" font-size="14" fill="#475569">error handling</text>
    </g>

    <line x1="695" y1="230" x2="765" y2="230" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(780 170)">
      <rect width="145" height="120" rx="12" fill="#fdf2f8" stroke="#f9a8d4"/>
      <circle cx="32" cy="34" r="16" fill="#db2777"/>
      <text x="27" y="40" font-size="16" font-weight="700" fill="#ffffff">4</text>
      <text x="22" y="72" font-size="17" font-weight="700" fill="#1e293b">Output</text>
      <text x="22" y="96" font-size="14" fill="#475569">JSON, nulls,</text>
      <text x="22" y="116" font-size="14" fill="#475569">confidence</text>
    </g>

    <path d="M852 300 C852 356, 612 356, 612 390" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(540 340)">
      <rect width="145" height="120" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
      <circle cx="32" cy="34" r="16" fill="#7c3aed"/>
      <text x="27" y="40" font-size="16" font-weight="700" fill="#ffffff">5</text>
      <text x="22" y="72" font-size="17" font-weight="700" fill="#1e293b">Code</text>
      <text x="22" y="96" font-size="14" fill="#475569">CLAUDE.md,</text>
      <text x="22" y="116" font-size="14" fill="#475569">Skills, hooks</text>
    </g>

    <line x1="530" y1="400" x2="445" y2="400" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(300 340)">
      <rect width="145" height="120" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
      <circle cx="32" cy="34" r="16" fill="#0891b2"/>
      <text x="27" y="40" font-size="16" font-weight="700" fill="#ffffff">6</text>
      <text x="22" y="72" font-size="17" font-weight="700" fill="#1e293b">Exam</text>
      <text x="22" y="96" font-size="14" fill="#475569">Mock tests,</text>
      <text x="22" y="116" font-size="14" fill="#475569">wrong answers</text>
    </g>

    <g transform="translate(755 352)">
      <rect width="270" height="84" rx="12" fill="#f8fafc" stroke="#d7dee8"/>
      <text x="22" y="34" font-size="16" font-weight="700" fill="#1f2937">Exam rule</text>
      <text x="22" y="58" font-size="14" fill="#475569">Choose the safest simple</text>
      <text x="22" y="76" font-size="14" fill="#475569">architecture that solves the scenario.</text>
    </g>
  </g>
</svg>
