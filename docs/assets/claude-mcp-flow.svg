<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Claude tool use and MCP request flow</title>
  <desc id="desc">A flow diagram showing user request, Claude, MCP client, MCP servers, tool execution, tool result, and final response.</desc>
  <rect width="1120" height="560" fill="#f8fafc"/>
  <rect x="24" y="24" width="1072" height="512" rx="18" fill="#ffffff" stroke="#d7dee8"/>
  <text x="60" y="78" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2937">Tool Use + MCP Flow</text>
  <text x="60" y="110" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">Claude chooses the action; your application or MCP server executes it and returns grounded results.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .label { font-family:Inter, Arial, sans-serif; fill:#1f2937; font-weight:700; font-size:16px; }
      .body { font-family:Inter, Arial, sans-serif; fill:#475569; font-size:13px; }
      .step { font-family:Inter, Arial, sans-serif; fill:#ffffff; font-weight:700; font-size:13px; }
    </style>
  </defs>

  <g>
    <rect x="60" y="185" width="155" height="96" rx="12" fill="#eef6ff" stroke="#93c5fd" stroke-width="2"/>
    <circle cx="88" cy="215" r="16" fill="#2563eb"/>
    <text x="84" y="220" class="step">1</text>
    <text x="112" y="219" class="label">User</text>
    <text x="82" y="250" class="body">Asks a task</text>
    <text x="82" y="268" class="body">requiring data/action</text>
  </g>

  <line x1="215" y1="233" x2="300" y2="233" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="315" y="170" width="185" height="126" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <circle cx="343" cy="202" r="16" fill="#16a34a"/>
    <text x="339" y="207" class="step">2</text>
    <text x="368" y="205" class="label">Claude</text>
    <text x="337" y="236" class="body">Reads context and</text>
    <text x="337" y="254" class="body">tool descriptions</text>
    <text x="337" y="272" class="body">Returns tool_use</text>
  </g>

  <line x1="500" y1="233" x2="585" y2="233" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="600" y="170" width="190" height="126" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <circle cx="628" cy="202" r="16" fill="#ea580c"/>
    <text x="624" y="207" class="step">3</text>
    <text x="654" y="205" class="label">App / MCP client</text>
    <text x="622" y="236" class="body">Executes client tool</text>
    <text x="622" y="254" class="body">or forwards request</text>
    <text x="622" y="272" class="body">to MCP server</text>
  </g>

  <line x1="790" y1="233" x2="875" y2="233" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="890" y="150" width="170" height="166" rx="12" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2"/>
    <circle cx="918" cy="182" r="16" fill="#db2777"/>
    <text x="914" y="187" class="step">4</text>
    <text x="945" y="185" class="label">MCP server</text>
    <text x="912" y="218" class="body">Tools: actions</text>
    <text x="912" y="238" class="body">Resources: data</text>
    <text x="912" y="258" class="body">Prompts: templates</text>
    <text x="912" y="288" class="body">Returns result or</text>
    <text x="912" y="306" class="body">isError: true</text>
  </g>

  <path d="M975 330 C975 410, 690 410, 690 312" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="725" y="394" font-family="Inter, Arial, sans-serif" font-size="14" fill="#2563eb" font-weight="700">tool_result with grounded data</text>

  <path d="M600 310 C520 390, 405 390, 405 310" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="430" y="376" font-family="Inter, Arial, sans-serif" font-size="14" fill="#2563eb" font-weight="700">Claude reasons over result</text>

  <path d="M315 300 C225 420, 125 380, 125 295" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="120" y="386" font-family="Inter, Arial, sans-serif" font-size="14" fill="#2563eb" font-weight="700">final answer or next tool call</text>

  <g transform="translate(60 430)">
    <rect width="1000" height="66" rx="12" fill="#f8fafc" stroke="#d7dee8"/>
    <text x="24" y="28" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937">Exam memory:</text>
    <text x="138" y="28" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Claude chooses tools from descriptions, but execution happens outside the model.</text>
    <text x="24" y="50" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">For critical actions, use application-side rules, confirmation tokens, audit logs, and human review.</text>
  </g>
</svg>
